# Deep Hedging GAN - Master Configuration

mafbm:
  K: 10               # Number of OU processes
  r: 100.0            # Geometric spacing base for gamma_k = r^(k - n)
  T: 1.0              # Terminal time for L2-optimal weight fitting
  hurst_grid:         # Hurst parameters to pre-calibrate
    - 0.05
    - 0.10
    - 0.15
    - 0.20
    - 0.25
    - 0.30
    - 0.35
    - 0.40
    - 0.45
  n_paths: 10000      # Number of paths for validation
  n_steps: 252        # Trading days per year

siggan:
  # Generator (AR-FNN)
  gen_hidden_dim: 256
  gen_n_layers: 4
  gen_dropout: 0.1
  noise_dim: 64       # Dimension of the MA-fBM conditioning vector

  # Discriminator (Signature-based)
  sig_depth: 3        # Truncation depth for path signatures
  disc_hidden_dim: 256
  disc_n_layers: 3

  # COT-GAN loss parameters
  n_cotgan_critics: 2  # Number of h and M networks for causal transport penalty
  lambda_gp: 10.0      # Gradient penalty weight (Wasserstein)
  lambda_cot: 1.0      # Causal transport penalty weight

  # Training
  n_epochs: 1000
  batch_size: 128
  lr_gen: 1e-4
  lr_disc: 1e-4
  n_critic_steps: 5    # Discriminator updates per generator update
  target_assets:
    - "^GSPC"         # S&P 500 spot
  n_generated: 1000000  # Synthetic episodes for RL training

rl:
  # State space
  state_dim: 64         # Including sig features, IV surface, inventory, moneyness, TTM
  sig_depth: 3          # Truncation depth for state path signatures
  iv_surface_n_strikes: 5
  iv_surface_n_maturities: 3
  history_window: 20    # Days of history for signature computation

  # Action space
  action_dim: 1         # Scalar hedge ratio

  # SigFormer architecture
  sigformer:
    n_layers: 5
    n_heads: 12
    d_model: 256
    d_ff: 1024
    dropout: 0.1
    sig_depth: 3

  # fRNN architecture
  frnn:
    hidden_dim: 256
    n_layers: 2
    dropout: 0.1

  # Reward function
  reward_scale: 10.0
  reward_base: 0.03
  alpha: 1.0            # Polynomial scaling for downside penalty
  es_window: 20         # Window for Expected Shortfall computation (dynamic kappa)
  es_quantile: 0.05     # ES quantile (5th percentile = CVaR_95)

  # TD3 hyperparameters
  td3:
    gamma: 0.99
    tau: 0.005           # Soft target update rate
    policy_noise: 0.2
    noise_clip: 0.5
    policy_delay: 2
    buffer_size: 1000000
    batch_size: 256
    lr_actor: 3e-4
    lr_critic: 3e-4
    exploration_noise: 0.1
    n_episodes: 10000
    n_steps_per_episode: 252

distillation:
  n_state_samples: 100000  # State-action pairs for SR fitting
  pysr:
    niterations: 100
    populations: 15
    maxsize: 25
    binary_operators: ["+", "-", "*", "/"]
    unary_operators: ["exp", "log", "abs", "sqrt"]
    verbosity: 0

validation:
  test_start: "2022-01-01"
  test_end: "2023-12-31"
  train_end: "2021-12-31"
  benchmarks:
    - "black_scholes"
    - "naive_td3"          # TD3 trained on historical data only
  metrics:
    - "accumulated_reward"
    - "terminal_downside_variance"
    - "cvar_5"
  option_params:
    moneyness_range: [0.9, 1.1]
    ttm_range: [30, 90]    # Days to maturity
    n_options: 100         # Number of option paths in backtest

paths:
  data_dir: "data/"
  models_dir: "models/"
  results_dir: "results/"
  logs_dir: "logs/"
